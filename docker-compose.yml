services:
  postgres:
    image: postgres:16-alpine
    container_name: delivery-dispatch-postgres
    environment:
      POSTGRES_DB: delivery_dispatch
      POSTGRES_USER: delivery_dispatch
      POSTGRES_PASSWORD: delivery_dispatch
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U delivery_dispatch -d delivery_dispatch"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
